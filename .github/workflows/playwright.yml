name: Playwright Automation Tests

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

  schedule:
    - cron: '0 7 * * *'

  workflow_dispatch:

jobs:
  test:
    name: Playwright Automation - ${{ matrix.browser }}
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    environment:
      name: qa

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Execute Playwright Tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate ./allure-results --clean -o allure-report

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.browser }}
          path: allure-report/
          retention-days: 30

      - name: Slack Notification - Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text":"✅ Automation Passed\nBrowser: ${{ matrix.browser }}\nEnvironment: QA\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nTriggered By: ${{ github.actor }}"
          }' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notification - Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text":"❌ Automation Failed\nBrowser: ${{ matrix.browser }}\nEnvironment: QA\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCheck GitHub Actions & Allure Reports."
          }' \
          ${{ secrets.SLACK_WEBHOOK_URL }}